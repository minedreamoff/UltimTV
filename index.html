<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>UltimTV – LE service qui respecte VOS données.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #05070b;
    color: #fff;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    background: #0b0f16;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1b202a;
}

.header-title {
    font-size: 22px;
    font-weight: bold;
}

.header-title span {
    color: #ff6b00;
}

.header a {
    color: #4da3ff;
    text-decoration: none;
    font-size: 14px;
}

/* CHAÎNES */
.channel-list {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
}

.channel {
    background: #10141d;
    border: 1px solid #1f2430;
    border-radius: 8px;
    padding: 12px;
}

.channel-logo {
    width: 140px;
    height: 80px;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
}

.channel-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.channel h3 {
    margin: 0;
    font-size: 17px;
}

.epg {
    margin-top: 6px;
    font-size: 13px;
}

.epg-now {
    color: #ff4d4d;
}

.epg-next {
    color: #4da3ff;
}

.watch-btn {
    margin-top: 10px;
    padding: 8px 12px;
    background: #ff6b00;
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
}

.watch-btn:hover {
    background: #ff7f2a;
}

/* PLAYER */
#player-container {
    padding: 20px;
    display: none;
}

video {
    width: 100%;
    border-radius: 10px;
    background: #000;
}
</style>

</head>
<body>

<div class="header">
    <div class="header-title">Ultim<span>TV</span></div>
    <a href="guide.html">📅 Guide TV</a>
</div>

<div id="player-container">
    <video id="player" controls autoplay></video>
</div>

<div class="channel-list">

    <!-- Exemple TF1 -->
    <div class="channel">
        <div class="channel-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/TF1_logo_2013.svg">
        </div>
        <h3>TF1</h3>

        <div class="epg">
            <div class="epg-now">🔴 En direct : Programme inconnu</div>
            <div class="epg-next">➡️ Suivant : Programme inconnu</div>
        </div>

        <button class="watch-btn" onclick="playChannel('https://viamotionhsi.netplus.ch/live/eds/tf1hd/browser-HLS8/tf1hd.m3u8')">Regarder</button>
    </div>

    <!-- Exemple France 2 -->
    <div class="channel">
        <div class="channel-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/France_2_logo_2018.svg">
        </div>
        <h3>France 2</h3>

        <div class="epg">
            <div class="epg-now">🔴 En direct : Programme inconnu</div>
            <div class="epg-next">➡️ Suivant : Programme inconnu</div>
        </div>

        <button class="watch-btn" onclick="playChannel('https://example.com/france2.m3u8')">Regarder</button>
    </div>

    <!-- Ajoute ici toutes tes chaînes -->
</div>

<script>
function playChannel(url) {
    document.getElementById("player-container").style.display = "block";
    const player = document.getElementById("player");
    player.src = url;
    player.play();
    window.scrollTo(0, 0);
}
</script>

</body>
</html>
